# Settings for Backend (on Cloud Run).
# See https://firebase.google.com/docs/app-hosting/configure#cloud-run
runConfig:
  minInstances: 0
  # maxInstances: 100
  # concurrency: 80
  # cpu: 1
  # memoryMiB: 512

# Environment variables and secrets.
env:
  - variable: R2_ENDPOINT
    value: https://003c6e6c0530ca5a1f036f2fca5028f2.r2.cloudflarestorage.com
    availability:
      - RUNTIME
  - variable: R2_BUCKET
    value: luna-website
    availability:
      - RUNTIME
  - variable: R2_PUBLIC_URL
    value: https://images.luna.gift
    availability:
      - RUNTIME
  # R2_ACCESS_KEY_ID 和 R2_SECRET_ACCESS_KEY 通过 Firebase Console 环境变量配置
  # GOOGLE_GENAI_API_KEY 通过 Firebase Console 环境变量配置（不可明文写入）
  - variable: RESEND_FROM_EMAIL
    value: bookings@luna.gift
    availability:
      - RUNTIME
  - variable: NEXT_PUBLIC_SITE_URL
    value: https://luna.gift
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_GOOGLE_MAPS_API_KEY
    value: AIzaSyAFTW4rMfnYFUIAKB4vCeDXZmVf-e86emU
    availability:
      - BUILD
      - RUNTIME
  # RESEND_API_KEY 通过 Firebase Console Secret Manager 设置（见下方说明）
  # - variable: RESEND_API_KEY
  #   secret: RESEND_API_KEY
